<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Réseaux Noto</title>
</head>
<body>

<div class="noto-page">

    <!-- LOGO -->
    <div class="noto-logo">
        <img src="media/logo_noto.png" alt="Noto Logo">
    </div>

    <div class="noto-title">NOTO</div>
    <div class="noto-subtitle">GTA V • Faille • Flashback WL</div>

    <!-- RESEAUX -->
    <div class="noto-links">

        <a class="noto-link" href="https://www.twitch.tv/noto_off" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.simpleicons.org/twitch" alt="">
            Twitch
        </a>

        <a class="noto-link" href="https://discord.com/invite/Q5BjxTzpnc" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.simpleicons.org/discord" alt="">
            Discord
        </a>

        <a class="noto-link" href="https://www.youtube.com/@Noto_Off/videos" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.simpleicons.org/youtube" alt="">
            YouTube
        </a>

        <a class="noto-link" href="https://www.instagram.com/noto_off/" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.simpleicons.org/instagram" alt="">
            Instagram
        </a>

        <a class="noto-link" href="https://ballasrecords.bandcamp.com/album/hfs" target="_blank" rel="noopener noreferrer">
            <img src="media/vinyle.jpg" alt="Vinyle">
            Vynile
        </a>

        <a class="noto-link" href="https://open.spotify.com/artist/5vIdtn8KS4UBXa0GzGPShH" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.simpleicons.org/spotify" alt="">
            Spotify
        </a>

    </div>

    <!-- FOOTER -->
    <footer>
        © Noto • Tous droits réservés
    </footer>

</div>

</body>
</html>
